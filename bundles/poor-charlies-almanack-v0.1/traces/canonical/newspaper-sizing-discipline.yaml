trace_id: newspaper-sizing-discipline
title: Newspaper sizing stayed below ruin even with conviction
related_skills:
- margin-of-safety-sizing
- opportunity-cost-of-the-next-best-idea
kind: historical_reference
situation: A quality local franchise still faced secular uncertainty and capital competition
  from other ideas.
decision: Cap size until downside, liquidity, and alternate uses of capital were all
  explicit.
outcome: The position stayed inside a survivable band instead of turning conviction
  into leverage.
source_note: Margin of safety controls exposure, not only entry price.
