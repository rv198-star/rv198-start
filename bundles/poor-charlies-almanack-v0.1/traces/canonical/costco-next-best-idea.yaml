trace_id: costco-next-best-idea
title: New idea must beat the next best live holding
related_skills: [opportunity-cost-of-the-next-best-idea, circle-of-competence]
kind: historical_reference
situation: Capital was limited and a new idea competed against a proven existing compounder.
decision: Compare against the best deployable alternative, not against idle cash.
outcome: The bar for switching stayed high and explicit.
source_note: Opportunity cost should be a live benchmark, not a slogan.
