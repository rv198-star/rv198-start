trace_id: incentive-caused-delusion-audit
title: Incentive-caused delusion triggers an explicit audit
related_skills:
- bias-self-audit
- circle-of-competence
kind: historical_reference
situation: An operator with identity and compensation exposure to one thesis began
  to rationalize weak evidence.
decision: Pause the decision and force a written bias audit before additional capital
  was committed.
outcome: The audit exposed incentive pressure that had been mistaken for insight.
source_note: The value is in naming the bias before it hardens into commitment.
