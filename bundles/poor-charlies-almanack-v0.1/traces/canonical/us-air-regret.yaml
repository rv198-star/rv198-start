trace_id: us-air-regret
title: US Air regret becomes a bias checklist anchor
related_skills: [bias-self-audit, margin-of-safety-sizing]
kind: historical_reference
situation: A superficially attractive investment hid incentive, competition, and overconfidence traps.
decision: The later lesson was to audit bias before trusting a neat thesis.
outcome: The mistake became a durable anti-pattern.
source_note: Bias review should happen before capital is committed, not after.
