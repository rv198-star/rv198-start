trace_id: unused-pricing-power-signal
title: Unused pricing power marks a great business
related_skills:
  - value-assessment-source-note
  - margin-of-safety-sizing
kind: historical_reference
situation: A business could still raise price without losing customers, showing that quality was not just brand familiarity but durable economic power.
decision: Treat unused pricing power as a direct signal that moat quality can convert into a stronger long-run value anchor before any sizing decision.
outcome: The valuation case became more specific than generic praise about quality or scale.
source_note: Unused pricing power is evidence that value can keep turning into price without damaging the business.
