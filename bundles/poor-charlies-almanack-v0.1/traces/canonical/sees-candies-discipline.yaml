trace_id: sees-candies-discipline
title: Quality justifies commitment only with bounded downside
related_skills: [margin-of-safety-sizing, opportunity-cost-of-the-next-best-idea]
kind: historical_reference
situation: A strong business was attractive, but commitment still depended on downside resilience and alternate uses of capital.
decision: Size up only after confirming pricing power and survivability.
outcome: Capital concentrated where quality and downside asymmetry aligned.
source_note: Margin of safety governs both entry and exposure.
