name: ci

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: |
          python -m unittest tests/test_packaging.py
          python -m unittest tests/test_profile_resolver.py
          python -m unittest tests/test_validator.py
          python -m unittest tests/test_pipeline.py
          python -m unittest tests/test_refiner.py

      - name: Validate reference bundle
        run: python scripts/validate_bundle.py bundles/poor-charlies-almanack-v0.1

      - name: Audit v0.6.8 boundary coverage
        run: >-
          python scripts/audit_boundary_coverage.py
          --review-cases tests/fixtures/v067-blind-review-cases.yaml
          --review-pack evidence/archive/reports/blind-review-packs/v0.6.7-multimodel-clean/clean-pack.json
          --output /tmp/kiu-v068-boundary-coverage.md
          --min-coverage 0.85
