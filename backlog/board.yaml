  target_version: v0.7.0
  status: todo
  priority: P0
  blocker_level: hard
  area: review-scoring
  summary: Extend generated-run review with world-alignment scores while keeping source, generated, usage, and boundary scores separable.
  acceptance:
  - Review reports source_fidelity_score, world_context_quality_score, temporal_policy_fit_score, application_gate_quality_score, decision_path_clarity_score, and workflow_boundary_resilience_score.
  - World-alignment score cannot compensate for source pollution or workflow-boundary drift.
  - Release gate can enforce world_alignment_score_min and source_pollution_errors = 0.
