  area: preflight
  summary: Add validation gates preventing world context from becoming source evidence or causing workflow-vs-agentic boundary drift.
  acceptance:
  - Validator/preflight detects world-context content copied into source anchors or source Evidence Summary.
  - Validator/preflight detects world-alignment gains caused by moving workflow_script_candidate logic into bundle/skills/.
  - Release review reports world_context_isolated and source_fidelity_preserved.
