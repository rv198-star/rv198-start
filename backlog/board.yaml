  status: todo
  priority: P0
  blocker_level: hard
  area: temporal-policy
  summary: Define bundle-level temporal profiles and skill-level temporal policies so alignment strength scales with temporal sensitivity and application risk.
  acceptance:
  - Bundle default sensitivity can be low, medium, or high.
  - Skill policies can override bundle defaults and define required context triggers.
  - Missing-context behavior supports apply_with_caveats, ask_more_context, partial_apply, and refuse.
  evidence:
  - docs/2026-04-24-v0.7-world-alignment-charter.md
- id: KIU-703
  title: isolated world-alignment artifacts
  target_version: v0.7.0
  status: todo
  priority: P0
  blocker_level: hard
  area: artifact-generation
  summary: Generate world_alignment artifacts beside skills without modifying source-faithful SKILL.md, anchors, or source evidence.
  acceptance:
  - Generated bundles can contain world_alignment/world_context.yaml, temporal_profile.yaml, and application_gate_schema.yaml.
  - Per-skill world_alignment directories include temporal_policy.yaml, pressure_tests.yaml, usage_caveats.yaml, decision_path.md, and scorecard.yaml where applicable.
  - skills/ remains source-faithful and auditable independently from world_alignment/.
  evidence:
  - docs/2026-04-24-v0.7-world-alignment-charter.md
- id: KIU-704
  title: application gate evaluation
  target_version: v0.7.0
  status: todo
  priority: P0
  blocker_level: hard
  area: application-gate
  summary: Implement the world-alignment application gate that evaluates available context against a skill temporal policy without rewriting the skill.
  acceptance:
  - Gate supports apply, apply_with_caveats, partial_apply, ask_more_context, and refuse.
  - Gate output includes source_skill_unchanged, required_context, reason, and decision_path.
  - Missing current context for medium/high sensitivity concrete applications blocks overconfident application.
  evidence:
  - docs/2026-04-24-v0.7-world-alignment-charter.md
