distillation_contract:
  schema_version: kiu.distillation-contract/v0.1
  mechanism_chain:
  - '`Historical Case Consequence Judgment` is anchored in multiple historical episodes,
    starting from "昔在颛顼，命南正重以司天，北正黎以司地。唐虞之际，绍重黎之後，使复典之，至于夏商，故重黎氏世序天地。其在周，程伯休甫其後也。当周宣王时，失其守而为司马氏。司马氏世典周史。惠襄之间，司马氏去周適(shì)晋。晋中军随会奔秦，而司马氏入少梁。
    自司马氏去周適晋，分散，或在卫，或在赵，或'
  use_situation_trigger:
  - user_applying_historical_case_to_current_judgment
  - decision_depends_on_case_consequence_pattern
  - user_needs_tradeoff_from_multiple_historical_examples
