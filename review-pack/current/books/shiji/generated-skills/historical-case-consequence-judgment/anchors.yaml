  path: ../../sources/shiji/0__卷一百三十__太史公自序第七十.md
  line_start: 21
  line_end: 33
  snippet: 名家苛察缴绕，使人不得反其意，专决於名而失人情，故曰“使人俭而善失真”。若夫控名责实，参伍不失，此不可不察也。 道家无为，又曰无不为，其实易行，其辞难知。其术以虚无为本，以因循为用。无成埶，无常形，故能究万物之情。不为物先，不为物後，故能为万物主。有法无法，因时为业；有度无度，因物与合。故曰“圣人不朽，时变是守。虚者道之常也，因者君之纲”也。群臣并至，使各自明也。其实中其声者谓之端，实不中其声者谓之窾(kuǎn)。窾言不听，奸乃不生，贤
- anchor_id: historical-case-consequence-judgment-evidence::shiji-0003
