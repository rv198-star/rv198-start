  snippet: 诸吕为从，谋弱京师，而勃反经合於权；吴楚之兵，亚夫驻於昌邑，以戹齐赵，而出委以梁。作《绛侯世家》第二十七。 七国叛逆，蕃屏京师，唯梁为扞；偩爱矜功，几获于祸。嘉其能距吴楚，作《梁孝王世家》第二十八。
    五宗既王，亲属洽和，诸侯大小为藩，爰得其宜，僭拟之事稍衰贬矣。作《五宗世家》第二十九。三子之王，文辞可观。作《三王世家》第三十。 末世争利，维彼奔义；让国饿死，天下称之。作《伯夷列传》第一。
