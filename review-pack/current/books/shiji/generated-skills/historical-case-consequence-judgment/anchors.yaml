  snippet: 重黎业之，吴回接之；殷之季世，粥子牒之。周用熊绎，熊渠是续。庄王之贤，乃复国陈；既赦郑伯，班师华元。怀王客死，兰咎屈原；好谀信谗，楚并於秦。嘉庄王之义，作《楚世家》第十。
