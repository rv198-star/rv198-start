  snippet: 填赵塞常山以广河内，弱楚权，明汉王之信於天下。作《张耳陈馀列传》第二十九。 收西河、上党之兵，从至彭城；越之侵掠梁地以苦项羽。作《魏豹彭越列传》第三十。
    以淮南叛楚归汉，汉用得大司马殷，卒破子羽于垓下。作《黥布列传》第三十一。 楚人迫我京索，而信拔魏赵，定燕齐，使汉三分天下有其二，以灭项籍。作《淮阴侯列传》第三十二。
    楚汉相距巩洛，而韩信为填颍川，卢绾绝籍粮饷。作《韩信卢绾列传》第三十三。 诸侯畔项王，唯齐连子羽城阳，汉得以间遂入彭城。
