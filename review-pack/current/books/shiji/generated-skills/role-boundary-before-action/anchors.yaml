  line_start: 83
  line_end: 119
  snippet: 诸侯既强，七国为从，子弟众多，无爵封邑，推恩行义，其埶销弱，德归京师。作《王子侯者年表》第九。 国有贤相良将，民之师表也。维见汉兴以来将相名臣年表，贤者记其治，不贤者彰其事。作《汉兴以来将相名臣年表》第十。
    维三代之礼，所损益各殊务，然要以近性情，通王道，故礼因人质为之节文，略协古今之变。作《礼书》第一。 乐者，所以移风易俗也。自雅颂声兴，则已好郑卫之音，郑卫之音所从来久矣。人情之所感，远俗则怀。比乐书以述来古，作《乐书》第二。
