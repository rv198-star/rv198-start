- anchor_id: role-boundary-before-action-evidence::shiji-0008
  kind: source_excerpt
  path: ../../sources/shiji/0__卷一百三十__太史公自序第七十.md
  line_start: 217
  line_end: 277
  snippet: 填赵塞常山以广河内，弱楚权，明汉王之信於天下。作《张耳陈馀列传》第二十九。 收西河、上党之兵，从至彭城；越之侵掠梁地以苦项羽。作《魏豹彭越列传》第三十。
    以淮南叛楚归汉，汉用得大司马殷，卒破子羽于垓下。作《黥布列传》第三十一。 楚人迫我京索，而信拔魏赵，定燕齐，使汉三分天下有其二，以灭项籍。作《淮阴侯列传》第三十二。
    楚汉相距巩洛，而韩信为填颍川，卢绾绝籍粮饷。作《韩信卢绾列传》第三十三。 诸侯畔项王，唯齐连子羽城阳，汉得以间遂入彭城。
- anchor_id: role-boundary-before-action-evidence::shiji-0011
  kind: source_excerpt
  path: ../../sources/shiji/1__卷一__五帝本纪第一.md
  line_start: 25
  line_end: 33
  snippet: 乃命羲、和，敬顺昊天，数法日月星辰，敬授民时。分命羲仲，居郁夷，曰旸谷。敬道日出，便程东作。日中，星鸟，以殷中春。其民析，鸟兽字微。申命羲叔，居南交。便程南为，敬致。日永，星火，以正中夏。其民因，鸟兽希革。申命和仲，居西土，曰昧谷。敬道日入，便程西成。夜中，星虚，以正中秋。其民夷易，鸟兽毛毨。申命和叔；居北方，曰幽都。便在伏物。日短，星昴，以正中冬。其民燠，鸟兽氄毛。岁三百六十六日，以闰月正四时。信饬百官，众功皆兴。
