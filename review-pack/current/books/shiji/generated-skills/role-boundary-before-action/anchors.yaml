  line_start: 35
  line_end: 39
  snippet: 上大夫壶遂曰：“昔孔子何为而作春秋哉？”太史公曰：“余闻董生曰：‘周道衰废，孔子为鲁司寇，诸侯害之，大夫壅之。孔子知言之不用，道之不行也，是非二百四十二年之中，以为天下仪表，贬天子，退诸侯，讨大夫，以达王事而已矣。’子曰：‘我欲载之空言，不如见之於行事之深切著明也。’夫春秋，上明三王之道，下辨人事之纪，别嫌疑，明是非，定犹豫，善善恶(wù)恶(è)，贤贤贱不肖，存亡国，继绝世，补敝起废，王道之大者也。易著天地阴阳四时五行，故长於变；礼经
- anchor_id: role-boundary-before-action-evidence::shiji-0004
  kind: source_excerpt
  path: ../../sources/shiji/0__卷一百三十__太史公自序第七十.md
  line_start: 41
  line_end: 81
  snippet: 於是论次其文。七年而太史公遭李陵之祸，幽於缧(léi)绁(xiè)。乃喟然而叹曰：“是余之罪也夫！是余之罪也夫！身毁不用矣。”退而深惟曰：“夫诗书隐约者，欲遂其志之思也。昔西伯拘羑(yǒu)里，演周易；孔子戹陈蔡，作春秋；屈原放逐，著离骚；左丘失明，厥有国语；孙子膑脚，而论兵法；不韦迁蜀，世传吕览；韩非囚秦，说难、孤愤；诗三百篇，大抵贤圣发愤之所为作也。此人皆意有所郁结，不得通其道也，故述往事，思来者。”於是卒述陶唐以来，至于麟止，自黄
- anchor_id: role-boundary-before-action-evidence::shiji-0005
