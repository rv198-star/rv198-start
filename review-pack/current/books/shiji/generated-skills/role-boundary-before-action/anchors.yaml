- anchor_id: role-boundary-before-action-evidence::shiji-0012
  kind: source_excerpt
  path: ../../sources/shiji/1__卷一__五帝本纪第一.md
  line_start: 35
  line_end: 47
  snippet: 尧立七十年得舜，二十年而老，令舜摄行天子之政，荐之於天。尧辟位凡二十八年而崩。百姓悲哀，如丧父母。三年，四方莫举乐，以思尧。尧知子丹朱之不肖，不足授天下，於是乃权授舜。授舜，则天下得其利而丹朱病；授丹朱，则天下病而丹朱得其利。尧曰“终不以天下之病而利一人”，而卒授舜以天下。尧崩，三年之丧毕，舜让辟丹朱於南河之南。诸侯朝觐者不之丹朱而之舜，狱讼者不之丹朱而之舜，讴歌者不讴歌丹朱而讴歌舜。舜曰“天也夫！”而後之中国践天子位焉，是为帝舜。
    虞
