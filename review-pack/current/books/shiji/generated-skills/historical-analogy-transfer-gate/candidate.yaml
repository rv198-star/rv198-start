  mechanism_chain:
  - '`Historical Analogy Transfer Gate` is a borrowed-value judgment skill anchored
    in "昔在颛顼，命南正重以司天，北正黎以司地。唐虞之际，绍重黎之後，使复典之，至于夏商，故重黎氏世序天地。其在周，程伯休甫其後也。当周宣王时，失其守而为司马氏。司马氏世典周史。惠襄之间，司马氏去周適(shì)晋。晋中军随会奔秦，而司马氏入少梁。
    自司马氏去周適晋，分散，或在卫，或在赵，或在秦。其在卫者，相中山。在赵者，'
