- anchor_id: solution-to-problem-reframing-case::effective-requirements-0013
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 262
  line_end: 357
  snippet: 要做好日常需求分析工作，核心在于理解业务驱动思想，而该思想的基础就是理解需求的层次、透彻分析需求的价值评估维度。 在上一章中，我们提出了业务驱动的需求思想，也就是避免简单地从技术视角展开、细化“方案级需求”，而应该先从用户视角、业务视角探究背后的“问题级需求”，然后找到能够解决问题，并且开发成本更合适的解决方案。
    案例分析 小王是一名实战经验还很少的需求分析师，在一次酒店管理系统的建设项目中，听到酒店前台人员提出一条需求：请在酒店入住界
- anchor_id: solution-to-problem-reframing-case::effective-requirements-0015
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 380
  line_end: 407
  snippet: 在明确是“谁”的需求时，不应仅把关注点放在需求提出者身上，还应该思考三个问题。 (1)需求提出者和需求使用者是否一致？如果不一致，则应该尽可能地收集需求使用者的真实反馈。
    (2)该需求是否涉及潜在的影响者？他们有什么不同的想法？通常当需求涉及业务操作流程时，业务的管理者会是影响者；当涉及业务数据时，数据的上游采集者和下游应用者可能是潜在影响者；当涉及业务规则时，风控、审计等相关部门可能是潜在影响者。
    (3)该需求是否能代表主流用户的声音
