- anchor_id: solution-to-problem-reframing-evidence::effective-requirements-0014
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 370
  line_end: 377
  snippet: 日常需求分析这一关键工作任务，可以分为还原需求、补充需求、评估需求三个步骤执行。 还原需求，核心要素有三个：Who（谁的需求）、Why（解决什么问题）、How（解决问题、成本合适的解决方案）；在执行时应该澄清问题(Who+Why)、了解背景（相关的业务场景）、建议并确定解决方案(How)。
    1.澄清问题 还原需求的核心思路如图2-3所示，澄清问题的思考过程也就是使用“过去时”回答这个需求要解决“谁”的“什么问题”。
