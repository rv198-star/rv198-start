  snippet: 对于是否应该挖掘、补充需求，有人赞成，认为不考虑周全，客户迟早也会提出，后面开发更麻烦；有人反对，认为很容易产生需求蔓延，而且当你提出更多的建议时，会提升客户的期望值。
    针对这样的两难问题，我个人的经验是“只挖掘问题，不挖掘方案”。因为对于问题级的探讨，客户是理性的；而对于方案级的探讨，客户是感性的。但无论怎么做，这些工作都需要投入更多的精力和时间，因此在实战中要有所取舍。
