- anchor_id: workflow-gateway-case::effective-requirements-0064
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 2510
  line_end: 2573
  snippet: 当识别出业务场景之后，还应该细化业务场景的事件流，从而实现以用户视角发现系统应该提供的功能。要执行好这个任务，则应该深入理解用户视角的场景描述、场景—挑战—方案两个基础思维。
    生活悟道场 （接第12.2.1节生活悟道场）当我成功地激发出外婆对相机的兴趣之后，接下来我决定通过用户视角的场景描述思路来帮助她老人家掌握这个新时代的“玩具”。
    “外婆，其实拍照这件事相当简单，只有三步：第一步我们要把相机打开；第二步用相机对准要拍的人或东西；第三
- anchor_id: workflow-gateway-case::effective-requirements-0066
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 2596
  line_end: 2637
  snippet: “这个方案不错，我回头告诉我朋友，仔细讨论一下技术可行性。”小李显得相当开心。 “怎么样？这就是场景—挑战—方案的逻辑，你有体会了吧？”我顺势做了一个总结。小李点点头，充满自信地告诉我：“今天的收获很大，我将在实践中不断用这种方法来武装自己！”
    相信通过这个小案例，大家都对这种思考方式有了直观的了解，简单总结如下。 (1)场景细化：将场景细化为事件流，先整理出用户预期的正常步骤，然后写出变化的情况。
    (2)问题/挑战识别：针对每一个步骤
- anchor_id: workflow-gateway-case::effective-requirements-0067
  kind: source_excerpt
