  line_end: 2687
  snippet: 具体的梳理方法我们已经在第13.2.2节“场景—挑战—方案”中列举过例子了，在这里不再重复，仅对一些写作要点进行补充说明。 1.重在人机交互而非人机界面，重在用户意图而非用户动作
