- anchor_id: workflow-gateway-case::effective-requirements-0068
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 2690
  line_end: 2697
  snippet: 相信大家从上面的案例中可以得出结论：不要用“如果……那么……”之类的结构，改用扩展事件流表示；不要用“重复执行……”之类的结构，改用子事件流表示。
    案例分析 我们再结合本书贯穿案例“体检医院管理系统”中的一个业务场景“收费人员：收费”，呈现一下分析过程。首先找到一切正常的情形，完成场景展开，生成基本事件流。
    然后基于这个基本事件流分析可能存在的扩展事件流，并通过编号体现出扩展点（例如，2a表示第2步的一个扩展，2b则表示第2步的另一个扩
- anchor_id: workflow-gateway-case::effective-requirements-0069
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 2700
  line_end: 2725
  snippet: 在用例分析的方法中，用例描述通常就是细化业务步骤，但这样的写法与要实现的功能并没有形成有机的关联。因此，我们建议在此基础上通过“遍历步骤分析困难”的方法，导出所需的功能。简单地说，就是针对每一步骤与客户了解存在的困难、挑战，然后构思系统解决方案。
    在这个步骤中，一般建议从两个角度来思考。首先是执行这些步骤时会遇到什么困难，也就是思考“在各个业务步骤、变化及异常情况下会遇到何困难？”“针对这些困难，系统需要提供什么样的功能支持？”两个问题
