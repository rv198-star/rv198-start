- anchor_id: stakeholder-resistance-tradeoff-case::effective-requirements-0033
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 1242
  line_end: 1311
  snippet: 很多干系人分析实践都侧重于他们的关注点，也就是正需求；但实际上他们的阻力点（或称之为担心点，即负需求）分析也是十分重要的。理解“干系人负需求”这个概念，是执行好该任务的关键。
    干系人负需求 案例分析 很多年前，我参与了一些电子政务系统的开发，在一次省、市、县三级的“效能监管系统”项目中遇到了一件有趣的事情。 这个项目首先在省厅进行了需求调研，调研告一段落后，省厅领导让我们到A市——他们最有代表性的一个地级市进行深入调研。
    去的那天，路上
- anchor_id: stakeholder-resistance-tradeoff-case::effective-requirements-0034
  kind: source_excerpt
  path: ../../sources/有效需求分析（第2版）.md
  line_start: 1314
  line_end: 1375
  snippet: 1.访谈干系人 在访谈干系人之前，应该根据“分而治之提问法”策略，先制订访谈提纲，即列出要访谈的内容树。通常有三种分而治之的角度。 (1)按KPI分解：KPI指标体系通常直接体现了管理者的核心关注点，因此可以事先进行收集、归类，然后逐一切入，以发现潜在的关注点和阻力点。
    (2)按工作主题分解：管理者通常会涉及多个不同的工作主题，如负责物资供应的经理会涉及领用、采购、仓储等不同主题。事先梳理出被访谈对象的工作主题，以便访谈时分而治之。
    (
