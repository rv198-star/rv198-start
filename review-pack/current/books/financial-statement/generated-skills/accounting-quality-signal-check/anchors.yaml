  path: ../../sources/财务报表分析_Markdown版.md
  line_start: 5725
  line_end: 5739
  snippet: 超常收益增长模型与剩余收益模型看似不同，但实质上却是一回事。它们均以预测的未来收益和股利信息为输入变量，只是剩余收益模型还多了一个步骤，需要根据这些预测值再预计未来的权益账面价值。
    从结构方面来看，这两个模型是类似的。 剩余收益估值模型以权益的账面价值为起点，然后再将预计收益超出了按必要报酬率计算的账面价值必要报酬的部分作为价值增量。超常收益增长模型以资本化的次年收益作为起点，然后再以预计（含息）收益超出了按必要报酬率计算的上年收益再投
- anchor_id: accounting-quality-signal-check-case::financial-statement-0612
  kind: source_excerpt
  path: ../../sources/财务报表分析_Markdown版.md
  line_start: 7527
  line_end: 7533
  snippet: 随着本书第二部分对财务报表分析介绍的深入，我们将逐步对碰到的会计问题进行强调。本书会对相关的会计工作程序进行大致的讲解，比如，在本章中，我们就介绍了有价证券和员工股票期权计划相关的知识点。接下来，我们会建议你参考本书配套网站上的“会计诊所”栏目，以了解更多的相关细节，比如，在会计诊所Ⅲ和会计诊所Ⅳ中，就对本章涉及的有价证券和股份支付内容进行了更多的介绍。
    我们需要理解会计的工作程序，但对于权益分析来说，我们还需要了解会计程序的不足之处。
