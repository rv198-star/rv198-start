  snippet: 由于我们的最终目的是为了估值，因此，会对企业未来的盈利水平特别关心；事实上，在本书所有关注的问题中，“购买未来盈利”一直是我们所遵循的投资者信条。我们利用企业当前的盈利信息和全部财务报表来帮助我们对企业的未来盈利水平进行预测。不过，如果当前的财务报表质量不好，就会误导我们的预测工作。因此，如果当期盈利不能很好地预示未来的盈利水平，投资者就会认为这样的盈余质量（earnings
    quality）是糟糕的。举例来说，如果在企业所报告的利润中
