- anchor_id: accounting-quality-signal-check-case::financial-statement-0940
  kind: source_excerpt
  path: ../../sources/财务报表分析_Markdown版.md
  line_start: 11549
  line_end: 11551
  snippet: '本章提醒分析人员要注意在确认企业的可持续盈利时会碰到的一系列会计问题，这些问题都与会计信息质量有关，因为它们可能导致企业报告“质量不好”的收益，并对未来收益的预测产生影响。因此，我们将这些问题也归纳到了“会计信息质量观察”栏目中。我们从第9章开始总结“会计信息质量观察”要点，并在第10章和第11章中继续这样做。现在，你已经有了一份有关会计信息质量问题的完整清单，可以为学习第18章中正式的会计信息质量分析做好准备了。
    | 0 | 1 | '
- anchor_id: accounting-quality-signal-check-case::financial-statement-1288
  kind: source_excerpt
  path: ../../sources/财务报表分析_Markdown版.md
  line_start: 15809
  line_end: 15815
  snippet: 新企业的创立是需要时间的，这对20世纪90年代后期的新兴互联网公司来说也不例外。由于对未来能够实现巨额盈利的预期，互联网门户企业和电子商务企业的股票市销率都非常高，但实际上，大部分这类企业从销售收入中留下的都只是亏损。
    这类企业在对媒体的解释中都坚持说，它们的“商业模式”决定了它们在实现未来盈利之前都必然会经历巨额的亏损，因为在前期对基础设施所进行的投资是必需的。比如，要建立客户基础和确立品牌地位，就注定了企业在广告投放和促销支出方面会
- anchor_id: accounting-quality-signal-check-case::financial-statement-1296
