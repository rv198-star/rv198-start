  snippet: 在本章的阅读材料 16-4 中，使用剩余经营性收益模型对耐克公司的股份进行了估值。接下来，请完成下列要求： a. 对阅读材料 16-4 中的预计数据进行修正，计算预计超常增长的经营性收益为多少，然后再对耐克公司的股份进行估值。
