  snippet: 17.1 节中的例子只涉及一个简单项目的估值，但其实，如果一家持续经营的企业总是坚持将它的账面价值保持在较低（或较高）水平，也能观察到类似的结果。本书再一次强调估值是不受会计方法的选择影响的，但是，市净率和市盈率却会受到影响，且受影响的程度将取决于投资规模的增长速度。下面我们首先考察在投资无增长情况下的估值，然后在考察当企业加大投资规模情况下的估值问题。
