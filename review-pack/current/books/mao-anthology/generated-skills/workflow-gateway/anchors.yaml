  snippet: 为着消灭日本侵略者，为着防止内战，为着建设新中国，必须将分裂的中国变为统一的中国，这是中国人民的历史任务。 但是如何统一呢？独裁者的专制的统一，还是人民的民主的统一呢？从袁世凯⒄以来，北洋军阀强调专制的统一。但是结果怎么样呢？和这些军阀的志愿相反，所得的不是统一而是分裂，最后是他们自己从台上滚下去。国民党反人民集团抄袭袁世凯的老路，追求专制的统一，打了整整十年的内战，结果把一个日本侵略者打了进来，自己也缩上了峨眉山⒅。现在又在山上大叫其
- anchor_id: workflow-gateway-counter-example::mao-0448
  kind: source_excerpt
  path: ../../sources/mao/082-论联合政府.md
  line_start: 173
  line_end: 180
  snippet: 中国人民要自由，要统一，要联合政府，要彻底地打倒日本侵略者和建设新中国，没有一支站在人民立场上的军队，那是不行的。彻底地站在人民立场的军队，现在还只有解放区的不很大的八路军和新四军，还很不够。可是，国民党内的反人民集团却处心积虑地要破坏和消灭解放区的军队。一九四四年，国民党政府提出了一个所谓“提示案”，叫共产党“限期取消”解放区军队的五分之四。一九四五年，即最近的一次谈判，又叫共产党将解放区军队全部交给它，然后它给共产党以“合法地位”。
