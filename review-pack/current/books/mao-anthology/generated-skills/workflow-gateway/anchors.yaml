  path: ../../sources/mao/082-论联合政府.md
  line_start: 148
  line_end: 160
  snippet: 为着彻底消灭日本侵略者，必须在全国范围内实行民主改革。而要这样做，不废止国民党的一党专政，建立民主的联合政府，是不可能的。 所谓国民党的一党专政，实际上是国民党内反人民集团的专政，它是中国民族团结的破坏者，是国民党战场抗日失败的负责者，是动员和统一中国人民抗日力量的根本障碍物。从八年抗日战争的惨痛经验中，中国人民已经深刻地认识了它的罪恶，很自然地要求立即废止它。这个反人民的专政，又是内战的祸胎，如不立即废止，内战惨祸又将降临。
