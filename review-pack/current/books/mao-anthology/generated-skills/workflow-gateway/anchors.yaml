  snippet: 中国共产党同意大西洋宪章和莫斯科、开罗、德黑兰、克里米亚各次国际会议(27)的决议，因为这些国际会议的决议都是有利于打败法西斯侵略者和维持世界和平的。
    中国共产党的外交政策的基本原则，是在彻底打倒日本侵略者，保持世界和平，互相尊重国家的独立和平等地位，互相增进国家和人民的利益及友谊这些基础之上，同各国建立并巩固邦交，解决一切相互关系问题，例如配合作战、和平会议、通商、投资等等。
