  snippet: 目前中国人民争自由的目标，首先地和主要地是向着日本侵略者。但是国民党政府剥夺人民的自由，捆起人民的手足，使他们不能反对日本侵略者。不解决这个问题，就不能在全国范围内动员和统一一切抗日的力量。我们在纲领中提出了废止一党专政，成立联合政府，取消特务，取消镇压自由的法令，惩办汉奸、间谍、亲日分子、法西斯分子和贪官污吏，释放政治犯，承认各民主党派的合法地位，撤退包围和进攻解放区的军队，承认解放区，废止保甲制度，以及其他许多经济的文化的和民众运动
- anchor_id: workflow-gateway-counter-example::mao-0447
