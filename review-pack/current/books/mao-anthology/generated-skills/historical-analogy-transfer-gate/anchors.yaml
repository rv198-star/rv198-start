- anchor_id: historical-analogy-transfer-gate-evidence::mao-0003
  kind: source_excerpt
  path: ../../sources/mao/000-中国社会各阶级的分析.md
  line_start: 17
  line_end: 35
  snippet: '------------------ 注　　释 〔1〕国家主义派指中国青年党，当时以其外围组织“中国国家主义青年团”的名义公开进行活动。组织这个政团的是一些反动政客，他们投靠帝国主义和当权的反动派，把反对中国共产党和苏联当作职业。
    〔2〕戴季陶（一八九一——一九四九），又名传贤，原籍浙江湖州，生于四川广汉。早年参加中国同盟会，从事过反对清政府和袁世凯的活动。后曾和蒋介石在上海共同经营交易所的投机事业。一九二五年随着孙中山的逝世和革命高潮'
- anchor_id: historical-analogy-transfer-gate-evidence::mao-0005
  kind: source_excerpt
  path: ../../sources/mao/001-湖南农民运动考察报告.md
  line_start: 9
  line_end: 9
  snippet: 我这回到湖南⑴，实地考察了湘潭、湘乡、衡山、醴陵、长沙五县的情况。从一月四日起至二月五日止，共三十二天，在乡下，在县城，召集有经验的农民和农运工作同志开调查会，仔细听他们的报告，所得材料不少。许多农民运动的道理，和在汉口、长沙从绅士阶级那里听得的道理，完全相反。许多奇事，则见所未见，闻所未闻。我想这些情形，很多地方都有。所有各种反对农民运动的议论，都必须迅速矫正。革命当局对农民运动的各种错误处置，必须迅速变更。这样，才于革命前途有所补益
- anchor_id: historical-analogy-transfer-gate-evidence::mao-0007
  kind: source_excerpt
  path: ../../sources/mao/001-湖南农民运动考察报告.md
  line_start: 17
  line_end: 22
  snippet: 农民的主要攻击目标是土豪劣绅，不法地主，旁及各种宗法的思想和制度，城里的贪官污吏，乡村的恶劣习惯。这个攻击的形势，简直是急风暴雨，顺之者存，违之者灭。其结果，把几千年封建地主的特权，打得个落花流水。地主的体面威风，扫地以尽。地主权力既倒，农会便成了唯一的权力机关，真正办到了人们所谓“一切权力归农会”。连两公婆吵架的小事，也要到农民协会去解决。一切事情，农会的人不到场，便不能解决。农会在乡村简直独裁一切，真是“说得出，做得到”。外界的人只
- anchor_id: historical-analogy-transfer-gate-evidence::mao-0008
  kind: source_excerpt
  path: ../../sources/mao/001-湖南农民运动考察报告.md
  line_start: 26
  line_end: 26
  snippet: 农民在乡里造反，搅动了绅士们的酣梦。乡里消息传到城里来，城里的绅士立刻大哗。我初到长沙时，会到各方面的人，听到许多的街谈巷议。从中层以上社会至国民党右派，无不一言以蔽之曰：“糟得很。”即使是很革命的人吧，受了那班“糟得很”派的满城风雨的议论的压迫，他闭眼一想乡村的情况，也就气馁起来，没有法子否认这“糟”字。很进步的人也只是说：“这是革命过程中应有的事，虽则是糟。”总而言之，无论什么人都无法完全否认这“糟”字。实在呢，如前所说，乃是广大的
