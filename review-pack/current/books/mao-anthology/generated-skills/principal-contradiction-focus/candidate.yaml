distillation_contract:
  schema_version: kiu.distillation-contract/v0.1
  mechanism_chain:
  - '`Principal Contradiction Focus` is a borrowed-value judgment skill anchored in
    "主观主义，在某些党员中浓厚地存在，这对分析政治形势和指导工作，都非常不利。因为对于政治形势的主观主义的分析和对于工作的主观主义的指导，其必然的结果，不是机会主义，就是盲动主义。至于党内的主观主义的批评，不要证据的乱说，或互相猜忌，往往酿成党内的无原则纠纷，破坏党的组织。
    关于党内批评问题，还有一点要说及的，就是有些同志'
  use_situation_trigger:
  - multiple_conflicts_compete_for_attention
  - strategy_requires_identifying_principal_contradiction
  - resources_are_spread_across_too_many_fronts
