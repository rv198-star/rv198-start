  path: ../../sources/mao/012-中国革命战争的战略问题.md
  line_start: 170
  line_end: 203
  snippet: 当时的情况是弱国抵抗强国。文中指出了战前的政治准备——取信于民，叙述了利于转入反攻的阵地——长勺，叙述了利于开始反攻的时机——彼竭我盈之时，叙述了追击开始的时机——辙乱旗靡之时。虽然是一个不大的战役，却同时是说的战略防御的原则。中国战史中合此原则而取胜的实例是非常之多的。楚汉成皋之战（31）、新汉昆阳之战（32）、袁曹官渡之战（33）、吴魏赤壁之战（34）、吴蜀彝陵之战（35）、秦晋淝水之战（36）等等有名的大战，都是双方强弱不同，弱者
