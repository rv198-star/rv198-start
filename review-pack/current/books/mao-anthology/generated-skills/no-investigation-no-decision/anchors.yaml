  snippet: '------------------ 注　　释 〔1〕 “实际”这一个概念，按照中国文字，有两种含义：一种是指真实的情况，一种是指人们的行动（也即一般人所说的实践）。毛泽东在他的著作中，应用这一个概念，时常是双关的。
    〔2〕 孙武子即孙武，中国春秋时代的著名军事学家，著《孙子》十三篇。本文引语见《孙子·谋攻》。 〔3〕从一九二一年七月中国共产党成立到一九三六年毛泽东著此文时，正是十五年。
    〔4〕陈独秀（一八七九——一九四二），安徽怀宁人'
