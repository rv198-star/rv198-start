distillation_contract:
  schema_version: kiu.distillation-contract/v0.1
  mechanism_chain:
  - '`Role Boundary Before Action` is anchored in role, mandate, and consequence evidence
    beginning with "谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。中国过去一切革命斗争成效甚少，其基本原因就是因为不能团结真正的朋友，以攻击真正的敌人。革命党是群众的向导，在革命中未有革命党领错了路而革命不失败的。我们的革命要有不领错路和一定成功的把握，不可不注意团结我们的真正的朋友，'
  use_situation_trigger:
  - user_deciding_whether_to_act_under_a_role_or_mandate
  - action_may_exceed_authority_or_responsibility_boundary
  - short_term_effectiveness_may_damage_long_term_order
