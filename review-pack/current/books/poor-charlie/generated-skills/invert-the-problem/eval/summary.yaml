key_failure_modes:
- Inversion can become vague advice unless it outputs explicit avoid-rules.
- Already-decided actions can misuse inversion as decorative post-hoc reasoning unless
  boundary rules reject them.
- Forward plans can sound coherent while leaving single-point failures and survival
  constraints unnamed.
- Concept, definition, and history-example prompts can look semantically related but
  must not trigger without a live decision objective.
