refusal:
- scenario_id: cannot-explain-business-clearly
  summary: 当用户说“好像懂了，但说不清楚怎么变现/怎么失败”时，应拒绝给出圈内判断。
  prompt_signals:
  - 说不清楚怎么变现
  - 好像懂了
  - 具体失败点还没想清楚
  boundary_reason: 说不清商业逻辑和失败机制，本身就是还不在圈内的证据。
  next_action_shape: 列出真正理解和不理解的部分，先 study_more，再决定是否投入或直接 decline。
  anchor_refs:
  - circle-trace-google
  - circle-trace-crypto
