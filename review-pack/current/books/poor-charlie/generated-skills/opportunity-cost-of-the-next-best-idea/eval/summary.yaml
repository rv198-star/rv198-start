key_failure_modes:
- Users often compare a new idea to cash instead of a real next-best opportunity.
- Users can keep the benchmark so vague that switching costs and foregone compounding
  never enter the comparison.
- Story strength can overwhelm ranking discipline unless the next-best alternative
  remains live and explicit.
