should_trigger:
- scenario_id: price-vs-value-before-sizing
  summary: 当用户在真实投资决策里问“价格合理吗”“值不值这个价”时，应先激活 valuation parent，而不是直接进入 sizing。
  prompt_signals:
  - 值不值这个价
  - 价格合理吗
  - 是不是高估了
  boundary_reason: 这是典型的 price-vs-value 判断，应该先建立价值锚点，再决定是否交给 sizing。
  next_action_shape: 应激活 value-assessment，并从护城河、安全边际、定价权、管理层、能力圈五个维度系统评估；先给出 value_view，再明确
    monitor_only / delegate_to_sizing / decline。
  anchor_refs:
  - value-assessment-source-note-n_margin_principle
  - value-assessment-source-note-n_margin_see_candies_trace
- scenario_id: panic-created-mispricing
  summary: 当市场恐慌、价格大跌，用户在问好公司是否被错杀时，应先判断价值锚点是否仍然成立。
  prompt_signals:
  - 市场跌了很多
  - 是不是错杀
  - 现在是不是机会
  boundary_reason: 这里先要判断 price 是否脱离 value，而不是直接给仓位。
  next_action_shape: 应激活 value-assessment，并引导用户在市场恐慌中冷静评估内在价值与价格的差距，确认是否出现安全边际，再决定
    delegate_to_sizing 或 monitor_only。
  anchor_refs:
  - value-assessment-source-note-n_margin_principle
  - value-assessment-source-note-n_salomon_cap_trace
- scenario_id: great-business-vs-ordinary-business
  summary: 当用户追问“这家公司和其他公司到底差在哪”且语义落在护城河、定价权、提价能力上时，应激活 valuation parent。
  prompt_signals:
  - 护城河很宽
  - 提价客户也不会跑
  - 和其他公司差在哪
  boundary_reason: 这不是纯规模比较，而是在追问 business quality 如何转成更高质量的价值。
  next_action_shape: 应重点分析定价权，并明确指出芒格认为“尚未利用的提价能力”是伟大企业最可靠的标志之一，因为它说明企业仍能把价值继续转成价格而不伤害竞争地位。
  anchor_refs:
  - value-assessment-source-note-n_margin_principle
  - value-assessment-source-note-n_margin_see_candies_trace
  - value-assessment-source-note-n_unused_pricing_power_trace
- scenario_id: graph-inferred-link-e_invert_margin_complements
  summary: 'Graph-to-skill distillation: `INFERRED` edge `e_invert_margin_complements`
    expands trigger language only when a live decision links `Invert the problem`
    and `Margin of safety sizing`.'
  prompt_signals:
  - Invert the problem
  - Margin of safety sizing
  - '# Invert the Problem Source Note Skill ID: invert-the-problem Primary Claim:...'
  - 价格合理吗
  - 安全边际够不够
  - 市盈率和品牌质量
  - 市场恐慌后的错杀
  - 护城河、提价和定价权
  boundary_reason: This relation is INFERRED, so it can widen trigger recall only
    with concrete decision context, explicit source evidence, and the existing do_not_fire_when
    boundary still active.
  next_action_shape: '先判断 value_anchor 是否成立，再看 price_or_valuation 是否脱离 business economics，最后
    handoff 到 sizing 或 decline。 Evidence check: verify source_location `sources/invert-the-problem.md:1-9`
    before expanding the trigger.'
  anchor_refs:
  - e_invert_margin_complements
  distillation_role: trigger_expansion
  extraction_kind: INFERRED
  source_location: sources/invert-the-problem.md:1-9
  graph_navigation:
    graph_report: GRAPH_REPORT.md
    communities:
    - community_id: c_risk_control
      label: Risk control
      top_node_id: n_margin_principle
      top_node_label: Margin of safety sizing
      node_count: 3
    suggested_questions:
    - Why does `Circle of competence` sit at the center of this graph, and what evidence
      would most change its routing?
    - Why does `Margin of safety sizing` sit at the center of this graph, and what
      evidence would most change its routing?
    - What is the operational boundary of `Boundary discipline`, and should it stay
      agentic or downgrade to workflow?
    - What is the operational boundary of `Error avoidance`, and should it stay agentic
      or downgrade to workflow?
    - Which missing evidence would most improve confidence for `Boundary discipline`?
should_not_trigger:
- scenario_id: short-term-trading-or-scale-only
  summary: 短线交易、技术指标择时、纯规模比较或纯概念解释不应触发这条 skill；纯规模和竞争格局问题应使用 scale-advantage-analysis。
  prompt_signals:
  - 日内交易
  - MACD
  - 员工8000人算不算大
  - 什么是内在价值
  boundary_reason: 这些场景要么不需要长期价值判断，要么只是纯概念查询，不是在面临一个需要做价值判断的真实投资决策。
  anchor_refs:
  - value-assessment-source-note-n_margin_principle
edge_case:
- scenario_id: private-business-or-angel
  summary: 加盟店、私有生意、天使轮等边界案例可部分适用，但必须先做能力圈与价值锚点校验。
  prompt_signals:
  - 加盟店
  - 天使轮
  - 这个估值有没有道理
  - 值不值得投
  boundary_reason: 这些场景没有稳定公开市场参照，valuation 只能先到 partial_applicability。
  next_action_shape: 应先做能力圈检验（是否真正理解这门生意），再评估护城河、安全边际、现金流与回本路径，最后判断 quoted valuation
    是否可信，并决定是否 handoff 给 sizing。
  anchor_refs:
  - value-assessment-source-note-n_margin_principle
  - value-assessment-source-note-n_salomon_cap_trace
refusal:
- scenario_id: speculative-asset-without-value-anchor
  summary: 对缺少稳定业务价值锚点的投机场景，应直接拒绝伪估值。
  prompt_signals:
  - 比特币
  - 最近涨很多
  - 值不值得买
  boundary_reason: 没有稳定价值锚点时，valuation parent 的责任是拒绝，而不是编造高深理由。
  next_action_shape: 明确写出“安全边际不适用于赌博”，并指出芒格本人对加密货币持强烈否定态度；输出 no_value_anchor、refuse
    与 decline，不要 handoff 给 sizing。
  anchor_refs:
  - value-assessment-source-note-n_margin_principle
